<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGHOU QMCS 内部专家精算系统 v6.5</title>
    <!-- 引入资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .glass-card { background: white !important; border: 1px solid #eee !important; color: black !important; box-shadow: none !important; }
            .text-blue-400 { color: #1e40af !important; }
            .text-emerald-500 { color: #059669 !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 安全获取 Firebase 配置
        const getFirebaseConfig = () => {
            try {
                return JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            } catch (e) {
                return {};
            }
        };

        const config = getFirebaseConfig();
        if (config.apiKey) {
            firebase.initializeApp(config);
        }
        
        const auth = config.apiKey ? firebase.auth() : null;
        const db = config.apiKey ? firebase.firestore() : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'internal-qmcs-v65';

        // 零件底价库 (后台逻辑)
        const PARTS_PRICE = {
            "PF08-1P2V": 13250, "PF08-1P4V": 22250, 
            "PA12-1P2V": 17200, "PA12-1P4V": 23400, "PA12-2P4V": 25400,
            "TB-2": 1500, "TB-2E": 2000, "TB-4": 1850, "TB-4E": 2350,
            "TB-6": 2200, "TB-6E": 2700, "TB-10": 2700, "TB-10E": 3200,
            "TB-16": 3300, "TB-25": 3900, "TB-32": 4800, "TB-50": 8800
        };

        const SYSTEM_FIXED = {
            "100-150": { p: 7400, w: 5300 }, "160-250": { p: 7400, w: 5300 },
            "280-350": { p: 8000, w: 5650 }, "360-530": { p: 8350, w: 5650 },
            "550-850": { p: 8800, w: 6250 }, "900-1300": { p: 10300, w: 6800 },
            "1400-1850": { p: 10550, w: 7400 }, "1900-2500": { p: 10750, w: 7800 },
            "2600-3300": { p: 12500, w: 8500 }, "3400-3500": { p: 11410, w: 8200 },
            "3600-4000": { p: 12000, w: 8500 }, "3700-4600": { p: 12000, w: 8500 }
        };

        const TECH_DB = {
            circuit2: [
                { range: "100-150", min: 100, max: 155, clamp: 'TB-2', pump: 'PF08-1P2V', mix: true },
                { range: "160-250", min: 160, max: 250, clamp: 'TB-4', pump: 'PF08-1P2V', mix: true },
                { range: "280-350", min: 280, max: 350, clamp: 'TB-6', pump: 'PF08-1P2V', mix: true },
                { range: "360-530", min: 360, max: 530, clamp: 'TB-10', pump: 'PA12-1P2V', mix: true }
            ],
            circuit4: [
                { range: "100-150", min: 100, max: 155, clamp: 'TB-2', pump: 'PA12-1P4V', q: 8 },
                { range: "160-250", min: 160, max: 250, clamp: 'TB-4', pump: 'PA12-1P4V', q: 8 },
                { range: "280-350", min: 280, max: 350, clamp: 'TB-6', pump: 'PA12-1P4V', q: 8 },
                { range: "360-530", min: 360, max: 530, clamp: 'TB-10', pump: 'PA12-1P4V', q: 8 },
                { range: "550-850", min: 550, max: 850, clamp: 'TB-16', pump: 'PA12-1P4V', q: 8 },
                { range: "900-1300", min: 900, max: 1300, clamp: 'TB-25', pump: 'PA12-1P4V', q: 8 },
                { range: "1400-1850", min: 1400, max: 1850, clamp: 'TB-25', pump: 'PA12-1P4V', q: 12 },
                { range: "1900-2500", min: 1900, max: 2500, clamp: 'TB-25', pump: 'PA12-1P4V', q: 16 },
                { range: "2600-3300", min: 2600, max: 3350, clamp: 'TB-32', pump: 'PA12-2P4V', q: 16 },
                { range: "3400-3500", min: 3351, max: 3550, clamp: 'TB-50', pump: 'PA12-2P4V', q: 12 },
                { range: "3600-4000", min: 3551, max: 4050, clamp: 'TB-50', pump: 'PA12-2P4V', q: 16 },
                { range: "3700-4600", min: 4051, max: 4650, clamp: 'TB-50', pump: 'PA12-2P4V', q: 16 }
            ]
        };

        const INCOTERMS = ['EXW', 'FOB', 'CFR', 'CIF', 'DAP', 'DDP'];

        // 图标组件 (确保无 JSX Fragment 问题)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
                truck: <g><rect x="1" y="3" width="15" height="13" rx="2" /><path d="M16 8h4l3 3v5h-7V8z" /></g>,
                globe: <g><circle cx="12" cy="12" r="10" /><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20" /></g>,
                save: <g><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></g>,
                history: <path d="M12 8v4l3 3m6-3a9 9 0 1 1-9-9c2.5 0 4.8 1 6.4 2.6L21 6v6h-6" />,
                cpu: <path d="M4 4h16v16H4V4zm4 0v16M12 4v16M16 4v16M4 8h16M4 12h16M4 16h16" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [isLocked, setIsLocked] = useState(true);
            const [accessCode, setAccessCode] = useState('');
            const [customer, setCustomer] = useState('');
            const [tonnage, setTonnage] = useState('');
            const [circuitType, setCircuitType] = useState(4);
            const [setQty, setSetQty] = useState(1);
            const [discount, setDiscount] = useState(100);
            const [bizMode, setBizMode] = useState('domestic');
            const [exRate, setExRate] = useState(7.24);
            
            // 商务配置
            const [needInstall, setNeedInstall] = useState(false);
            const [instPpl, setInstPpl] = useState(1);
            const [instDays, setInstDays] = useState(2);
            const [instWage, setInstWage] = useState(500);
            const [instStay, setInstStay] = useState(0);
            
            const [intlTerm, setIntlTerm] = useState('EXW');
            const [intlFlight, setIntlFlight] = useState(0);
            const [intlSubsidy, setIntlSubsidy] = useState(50);
            const [intlCustoms, setIntlCustoms] = useState(1500);
            const [intlFreight, setIntlFreight] = useState(0);
            const [intlMisc, setIntlMisc] = useState(500);

            const [quoteDate, setQuoteDate] = useState(new Date().toISOString().split('T')[0]);
            const [quoteTime, setQuoteTime] = useState('');
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);

            useEffect(() => {
                if (auth) auth.signInAnonymously().catch(console.error);
                const timer = setInterval(() => setQuoteTime(new Date().toLocaleTimeString('zh-CN', { hour12: false })), 1000);
                return () => clearInterval(timer);
            }, []);

            const handleLogin = () => {
                if (accessCode === 'kh666') {
                    setIsLocked(false);
                    loadHistory();
                } else alert('验证码错误');
            };

            const loadHistory = async () => {
                if (!db) return;
                try {
                    const snap = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quotes').get();
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    list.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setHistory(list.slice(0, 10));
                } catch (e) { console.error(e); }
            };

            const saveQuote = async () => {
                if (!db) return;
                if (!customer || !tonnage) return alert('请先完善客户名称和吨位');
                const data = {
                    customer, tonnage, setQty, finalRMB: Math.round(finalResults.rmb),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    quoteAt: `${quoteDate} ${quoteTime}`
                };
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('quotes').add(data);
                    alert('报价已成功保存至云端');
                    loadHistory();
                } catch (e) { alert('保存失败'); }
            };

            const selection = useMemo(() => {
                const t = parseFloat(tonnage);
                if (isNaN(t)) return null;
                return (circuitType === 2 ? TECH_DB.circuit2 : TECH_DB.circuit4).find(d => t >= d.min && t <= d.max) || null;
            }, [tonnage, circuitType]);

            const systemModel = useMemo(() => {
                if (!tonnage) return 'KINGHOU QMCS 系统';
                return `KINGHOU QMCS-${tonnage}T-${circuitType}C`;
            }, [tonnage, circuitType]);

            const breakdown = useMemo(() => {
                if (!selection) return null;
                const m = parseInt(setQty) || 1;
                let items = [];
                let base = 0;

                if (selection.mix) {
                    items.push({ name: `标准夹模器 (${selection.clamp})`, qty: 4 * m });
                    items.push({ name: `保压夹模器 (${selection.clamp}E)`, qty: 4 * m });
                    base += (PARTS_PRICE[selection.clamp] * 4 + PARTS_PRICE[selection.clamp + 'E'] * 4);
                } else {
                    items.push({ name: `标准夹模器 (${selection.clamp})`, qty: selection.q * m });
                    base += (PARTS_PRICE[selection.clamp] * selection.q);
                }

                items.push({ name: `气动泵组合单元 (${selection.pump})`, qty: 1 * m });
                base += PARTS_PRICE[selection.pump];

                const f = SYSTEM_FIXED[selection.range];
                items.push({ name: "油压系统配管", qty: 1 * m });
                items.push({ name: "电气系统配线", qty: 1 * m });
                base += (f.p + f.w);

                return { items, basePricePerSet: base };
            }, [selection, setQty]);

            const finalResults = useMemo(() => {
                if (!breakdown) return { rmb: 0, usd: 0, product: 0, labor: 0, commerce: 0, tax: 0 };
                const m = parseInt(setQty) || 1;
                const productVal = breakdown.basePricePerSet * m * (discount / 100);
                let laborVal = 0, commerceVal = 0;

                if (bizMode === 'domestic') {
                    laborVal = needInstall ? (instPpl * instDays * instWage) + parseFloat(instStay || 0) : 0;
                    const sub = productVal + laborVal;
                    const taxVal = sub * 0.13;
                    return { rmb: sub + taxVal, usd: (sub + taxVal) / exRate, product: productVal, labor: laborVal, commerce: 0, tax: taxVal };
                } else {
                    laborVal = needInstall ? (instPpl * instDays * intlSubsidy * exRate) + parseFloat(intlFlight || 0) : 0;
                    commerceVal = parseFloat(intlCustoms) + parseFloat(intlMisc);
                    if (intlTerm !== 'EXW') commerceVal += parseFloat(intlFreight);
                    const total = productVal + laborVal + commerceVal;
                    return { rmb: total, usd: total / exRate, product: productVal, labor: laborVal, commerce: commerceVal, tax: 0 };
                }
            }, [breakdown, setQty, discount, bizMode, needInstall, instPpl, instDays, instWage, instStay, intlSubsidy, intlFlight, intlTerm, intlCustoms, intlFreight, intlMisc, exRate]);

            if (isLocked) {
                return (
                    <div className="h-screen flex items-center justify-center bg-[#020617] p-6">
                        <div className="glass-card w-full max-w-sm p-12 rounded-[3.5rem] text-center space-y-10 animate-in zoom-in duration-500">
                            <Icon name="shield" size={60} className="mx-auto text-blue-500" />
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase text-white">KINGHOU <span className="text-blue-500">QMCS</span></h1>
                            <div className="space-y-4">
                                <input type="password" placeholder="请输入授权密码" className="w-full bg-slate-800 border-none rounded-2xl p-5 text-center text-xl font-black tracking-widest text-white outline-none focus:ring-2 focus:ring-blue-600 transition-all" value={accessCode} onChange={e=>setAccessCode(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleLogin()} />
                                <button onClick={handleLogin} className="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase text-sm tracking-widest text-white shadow-xl transition-all">确认进入系统</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-[1500px] mx-auto pb-32">
                    <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-8 no-print">
                        <div className="flex items-center gap-5">
                            <div className="bg-blue-600 p-3 rounded-2xl text-white shadow-lg"><Icon name="cpu" size={24}/></div>
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter uppercase">QMCS Expert <span className="text-blue-500">v6.5</span></h1>
                                <p className="text-[10px] font-bold text-slate-500 tracking-widest">{quoteDate} {quoteTime}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowHistory(true)} className="px-6 py-3 bg-slate-800 rounded-2xl text-[11px] font-black text-slate-400 hover:text-white transition-all flex items-center gap-2">
                                <Icon name="history" size={16} /> 云端历史库
                            </button>
                            <div className="flex bg-slate-800 p-1 rounded-2xl border border-white/5">
                                <button onClick={()=>setBizMode('domestic')} className={`px-6 py-3 rounded-xl text-[10px] font-black transition-all ${bizMode==='domestic'?'bg-blue-600 text-white shadow-lg':'text-slate-500 hover:text-white'}`}>国内贸易</button>
                                <button onClick={()=>setBizMode('intl')} className={`px-6 py-3 rounded-xl text-[10px] font-black transition-all ${bizMode==='intl'?'bg-blue-600 text-white shadow-lg':'text-slate-500 hover:text-white'}`}>国际出口</button>
                            </div>
                        </div>
                    </header>

                    {/* 整体布局 3:2 左右结构 */}
                    <main className="grid grid-cols-1 lg:grid-cols-5 gap-10">
                        
                        <div className="lg:col-span-3 space-y-10">
                            
                            {/* 1. 参数输入区 */}
                            <section className="glass-card p-10 rounded-[3.5rem] shadow-xl space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">客户名称</label><input type="text" value={customer} onChange={e=>setCustomer(e.target.value)} className="w-full bg-slate-800/40 border-none rounded-2xl p-4 font-bold text-white outline-none focus:ring-1 focus:ring-blue-500" placeholder="Client Name" /></div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">注塑机吨位 (T)</label><input type="number" value={tonnage} onChange={e=>setTonnage(e.target.value)} className="w-full bg-slate-800/40 border-none rounded-2xl p-4 font-black text-2xl text-white outline-none focus:ring-1 focus:ring-blue-500" /></div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">报价套数 (Sets)</label><input type="number" value={setQty} onChange={e=>setSetQty(e.target.value)} className="w-full bg-slate-800 border-none rounded-2xl p-4 font-black text-2xl text-blue-400 outline-none ring-2 ring-blue-900/40" /></div>
                                    <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">折扣比例 (%)</label><input type="number" value={discount} onChange={e=>setDiscount(e.target.value)} className="w-full bg-slate-800 border-none rounded-2xl p-4 text-emerald-500 font-black text-2xl outline-none" /></div>
                                </div>
                                <div className="grid grid-cols-2 gap-6 no-print">
                                    <button onClick={()=>setCircuitType(2)} className={`py-4 rounded-[2rem] font-black text-[11px] border-2 transition-all ${circuitType===2?'bg-white text-slate-950 border-white shadow-xl':'border-slate-800 text-slate-500'}`}>两回路 (混合配置 2+2)</button>
                                    <button onClick={()=>setCircuitType(4)} className={`py-4 rounded-[2rem] font-black text-[11px] border-2 transition-all ${circuitType===4?'bg-white text-slate-950 border-white shadow-xl':'border-slate-800 text-slate-500'}`}>四回路 (标准配置)</button>
                                </div>
                            </section>

                            {/* 2. 报价配置明细 (单套方案联动) */}
                            <section className="glass-card p-10 rounded-[3.5rem] shadow-xl space-y-8 animate-in slide-in-from-bottom-8 duration-500">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-white/5 pb-8 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-blue-500 uppercase tracking-widest block">系统型号 / 品名 (System Model)</label>
                                        <h3 className="text-4xl font-black italic text-white tracking-tighter">{systemModel}</h3>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">配置明细 ({setQty} 套方案联动)</p>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    {breakdown ? breakdown.items.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-8 bg-slate-800/20 rounded-[2.5rem] border border-white/5 hover:border-blue-500/20 transition-all group">
                                            <p className="text-lg font-bold text-slate-300 group-hover:text-blue-400 transition-colors uppercase">{item.name}</p>
                                            <div className="flex items-center gap-4">
                                                <span className="text-[10px] font-black text-slate-600 uppercase">总计数量</span>
                                                <span className="text-4xl font-black text-white italic">{item.qty}</span>
                                            </div>
                                        </div>
                                    )) : <div className="col-span-2 py-20 text-center text-slate-700 font-black italic tracking-widest uppercase opacity-20 text-2xl">输入吨位自动生成零件清单</div>}
                                </div>
                            </section>

                            {/* 3. 安装派遣、差旅与物流 (移至下方) */}
                            <section className="glass-card p-10 rounded-[3.5rem] shadow-xl space-y-10 border-white/5">
                                <div className="flex justify-between items-center no-print">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center gap-3"><Icon name="truck" /> 安装派遣、差旅及物流杂费核算</h3>
                                    <button onClick={()=>setNeedInstall(!needInstall)} className={`px-8 py-3 rounded-2xl text-[10px] font-black transition-all ${needInstall?'bg-emerald-600 text-white shadow-lg shadow-emerald-900/20':'bg-slate-800 text-slate-500 hover:text-white'}`}>安装派遣服务: {needInstall?'ON':'OFF'}</button>
                                </div>
                                {needInstall && (
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 animate-in slide-in-from-top-4 duration-300">
                                        <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">派遣人数</label><input type="number" value={instPpl} onChange={e=>setInstPpl(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                        <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">服务天数</label><input type="number" value={instDays} onChange={e=>setInstDays(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                        {bizMode === 'domestic' ? (
                                            <>
                                                <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">人日工资</label><input type="number" value={instWage} onChange={e=>setInstWage(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                                <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">住宿/交通杂费</label><input type="number" value={instStay} onChange={e=>setInstStay(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">国外补贴($/天)</label><input type="number" value={intlSubsidy} onChange={e=>setIntlSubsidy(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                                <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase">往返机票费</label><input type="number" value={intlFlight} onChange={e=>setIntlFlight(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white outline-none" /></div>
                                            </>
                                        )}
                                    </div>
                                )}
                                {bizMode === 'intl' && (
                                    <div className="pt-8 border-t border-white/5 space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">贸易条款 (Incoterms)</label><select value={intlTerm} onChange={e=>setIntlTerm(e.target.value)} className="w-full bg-slate-800 border-none rounded-2xl p-4 font-black text-white outline-none">{INCOTERMS.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">结算汇率 (USD/CNY)</label><input type="number" value={exRate} onChange={e=>setExRate(e.target.value)} className="w-full bg-slate-800 border-none rounded-2xl p-4 font-black text-blue-400 outline-none" /></div>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-6">
                                            <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase tracking-widest">报关报检杂费</label><input type="number" value={intlCustoms} onChange={e=>setIntlCustoms(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white" /></div>
                                            <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase tracking-widest">国际运费/物流</label><input type="number" value={intlFreight} onChange={e=>setIntlFreight(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white" /></div>
                                            <div className="space-y-1"><label className="text-[8px] font-black text-slate-500 uppercase tracking-widest">出口包装杂费</label><input type="number" value={intlMisc} onChange={e=>setIntlMisc(e.target.value)} className="w-full bg-slate-800 rounded-xl p-3 border-none font-bold text-white" /></div>
                                        </div>
                                    </div>
                                )}
                            </section>
                        </div>

                        {/* 4. 右侧结果汇总 (加宽 40%) */}
                        <div className="lg:col-span-2">
                            <div className="bg-blue-600 p-12 rounded-[4.5rem] text-white space-y-12 sticky top-10 shadow-2xl overflow-hidden glass-card border-none transition-all">
                                <div className="absolute top-0 right-0 opacity-10 -translate-y-8 rotate-12"><Icon name="globe" size={300}/></div>
                                <div className="space-y-3 relative z-10">
                                    <p className="text-[12px] font-black uppercase tracking-[0.4em] opacity-60 italic">Total Quotation Summary</p>
                                    <h2 className="text-7xl font-black tracking-tighter leading-tight italic drop-shadow-md">¥ {Math.round(finalResults.rmb).toLocaleString()}</h2>
                                    {bizMode === 'intl' && <p className="text-4xl font-black text-blue-200 mt-5 drop-shadow-sm">$ {Math.round(finalResults.usd).toLocaleString()}</p>}
                                </div>
                                <div className="space-y-6 pt-10 border-t border-white/20 relative z-10 text-sm font-bold uppercase tracking-widest opacity-90">
                                    <div className="flex justify-between items-center"><span>折后产品价值小计</span><span>¥ {finalResults.product.toLocaleString()}</span></div>
                                    <div className="flex justify-between items-center text-blue-100"><span>物流、贸易及出口杂费</span><span>¥ {finalResults.commerce.toLocaleString()}</span></div>
                                    <div className="flex justify-between items-center text-blue-100"><span>人工支持、差旅及补贴</span><span>¥ {finalResults.labor.toLocaleString()}</span></div>
                                    <div className="flex justify-between items-center text-white/50 border-t border-white/10 pt-8">
                                        <span>增值税 (13%)</span>
                                        <span>{bizMode==='domestic' ? `¥ ${finalResults.tax.toLocaleString()}` : '出口贸易(零税率)'}</span>
                                    </div>
                                </div>
                                <div className="space-y-4 pt-8 relative z-10 no-print">
                                    <button onClick={() => window.print()} className="w-full bg-white text-blue-600 py-7 rounded-[2rem] font-black uppercase text-sm tracking-widest shadow-xl transition-all active:scale-95">导出正式报价单 (PDF)</button>
                                    <button onClick={saveQuote} className="w-full bg-blue-900/40 text-white/70 py-5 rounded-3xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-3 hover:bg-blue-900/60 transition-all border border-blue-400/20">同步至云端历史库</button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 历史面板 */}
                    {showHistory && (
                        <div className="fixed inset-0 z-[70] flex items-center justify-center p-6 bg-slate-950/90 backdrop-blur-xl no-print animate-in fade-in duration-300">
                            <div className="absolute inset-0" onClick={() => setShowHistory(false)}></div>
                            <div className="bg-slate-900 w-full max-w-3xl rounded-[4rem] shadow-2xl relative z-10 border border-white/10 overflow-hidden flex flex-col max-h-[85vh]">
                                <div className="p-10 border-b border-white/5 flex justify-between items-center bg-white/5">
                                    <div className="flex items-center gap-4"><Icon name="history" size={24} /><h3 className="font-black text-white uppercase tracking-[0.2em] text-xl italic">云端报价历史档案</h3></div>
                                    <button onClick={() => setShowHistory(false)} className="w-14 h-14 flex items-center justify-center rounded-2xl bg-slate-800 text-slate-400 hover:text-white transition-all text-xl font-bold">✕</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-10 space-y-5 custom-scrollbar bg-slate-900/40">
                                    {history.map((item) => (
                                        <div key={item.id} className="p-8 bg-slate-800/40 rounded-[2.5rem] border border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 hover:bg-slate-800 transition-all group">
                                            <div className="text-center md:text-left space-y-1">
                                                <p className="text-xl font-black text-white group-hover:text-blue-400 transition-all">{item.customer || '匿名项目'}</p>
                                                <p className="text-[11px] text-slate-500 font-bold uppercase tracking-widest italic">{item.tonnage}T | {item.setQty} 套方案 | {item.quoteAt}</p>
                                            </div>
                                            <p className="text-3xl font-black text-blue-500 tracking-tighter leading-none">¥ {item.finalRMB?.toLocaleString()}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
